<link rel="icon" type="image/png" sizes="32x32" href="./assets/Loading Page/Black-logo.png?v=2" />
<link rel="icon" type="image/png" sizes="16x16" href="./assets/Loading Page/Black-logo.png?v=2" />

  <style>
    html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: url("./assets/Loading Page/Background.jpg") center center / cover no-repeat;
  background-color: #000;
}

    :root { --vh: 1vh; }

   #c {
  position: fixed;
  inset: 0;
  display: block;
  width: 100%;
  height: 100%;
}

#loader {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  overflow: hidden;
  background-color: #000;
}

body.ios #loader {
  height: calc(var(--vh, 1vh) * 100);
}

#loader-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: loaderBgDrift 20s ease-in-out infinite;
  will-change: transform;
  pointer-events: none;
}


@keyframes loaderBgDrift {
  0% {
    transform: scale(1) translate(0px, 0px);
  }
  50% {
    transform: scale(1.03) translate(-6px, -4px);
  }
  100% {
    transform: scale(1) translate(0px, 0px);
  }
}

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .loader-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

body.ios .loader-inner {
  transform: translateY(-6%);
}

#loader-status {
  margin-top: 18px;
  min-height: 18px;
  color: #fff;
  font-family: monospace;
  font-size: 18px;
  line-height: 1;
  text-align: center;
  user-select: none;
  opacity: 0.9;
  letter-spacing: 0.08em;
}

body.ios #loader-status {
  margin-top: 6px;
  font-size: 18px;
}

#loader-status.is-enter-ready {
  display: inline-block;
  animation: loaderEnterPulse 2.6s ease-in-out infinite;
  -webkit-animation: loaderEnterPulse 2.6s ease-in-out infinite;
  color: #ffffff;
  text-shadow:
    0 0 4px rgba(255,255,255,0.18),
    0 0 10px rgba(255,255,255,0.08);
  letter-spacing: 0.06em;
  will-change: transform, opacity, text-shadow;
  opacity: 0.78; /* 👈 ADD THIS */
}

@keyframes loaderEnterPulse {
  0% {
    opacity: 0.75;
    transform: translateY(0) scale(1);
    text-shadow:
      0 0 3px rgba(255,255,255,0.10),
      0 0 8px rgba(255,255,255,0.04);
  }

  50% {
    opacity: 0.95;
    transform: translateY(-1px) scale(1.025);
    text-shadow:
      0 0 6px rgba(255,255,255,0.22),
      0 0 14px rgba(255,255,255,0.10);
  }

  100% {
    opacity: 0.75;
    transform: translateY(0) scale(1);
    text-shadow:
      0 0 3px rgba(255,255,255,0.10),
      0 0 8px rgba(255,255,255,0.04);
  }
}

@-webkit-keyframes loaderEnterPulse {
  0% {
    opacity: 0.78;
    transform: translateY(0) scale(1);
    text-shadow:
      0 0 3px rgba(255,255,255,0.10),
      0 0 8px rgba(255,255,255,0.04);
  }

  50% {
    opacity: 1;
    transform: translateY(-1px) scale(1.025);
    text-shadow:
      0 0 6px rgba(255,255,255,0.22),
      0 0 14px rgba(255,255,255,0.10);
  }

  100% {
    opacity: 0.78;
    transform: translateY(0) scale(1);
    text-shadow:
      0 0 3px rgba(255,255,255,0.10),
      0 0 8px rgba(255,255,255,0.04);
  }
}

body.ios #loader-status {
  margin-top: 16px;
  font-size: 17px;
}

.loader-logo-wrap {
  position: relative;
  width: min(55vw, 520px);
  transform: translateX(-23px);
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* iOS only */
body.ios .loader-logo-wrap {
  width: clamp(250px, 44vw, 340px);
  transform: translate(-6px, 4px);
}

.loader-logo {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;

  /* 🔥 subtle lift */
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.08))
          drop-shadow(0 0 18px rgba(255,255,255,0.04));
}

.loader-logo-white {
  filter: brightness(0) invert(1);
}

.logo-fill-mask {
  position: absolute;
  inset: 0;
  overflow: hidden;

  /* starts with nothing revealed */
  clip-path: inset(100% 0 0 0);
  -webkit-clip-path: inset(100% 0 0 0);
}

.loader-logo-black {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
}
  </style>
</head>

<body>

<div id="loader">
  <img
    id="loader-bg"
    src="./assets/Loading Page/Background.jpg"
    alt=""
    aria-hidden="true"
  />
  <div class="loader-inner">
    <div class="loader-logo-wrap">
      <img
        class="loader-logo loader-logo-black"
        src="./assets/Loading Page/Logo-Outline.svg"
        alt="Loading logo"
      />

      <div class="logo-fill-mask">
        <img
          class="loader-logo loader-logo-black"
          src="./assets/Loading Page/Black logo.svg"
          alt=""
        />
      </div>
    </div>

    <div id="loader-status">0%</div>
  </div>
</div>

  <canvas id="c"></canvas>

  <!-- Import map so main.js can import "three" -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script>
  function isIOS() {
    return (
      /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)
    );
  }

  if (isIOS()) {
    document.body.classList.add("ios");
  }
</script>

  <!-- ✅ iOS viewport height fix (handles Safari tabs/address bar changing) -->
  <script>
    function setVH() {
      const vv = window.visualViewport;
      const h = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty("--vh", `${h * 0.01}px`);
    }

    // run once
    setVH();

    // keep updated
    window.addEventListener("resize", setVH);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", setVH);
      window.visualViewport.addEventListener("scroll", setVH);
    }

    // Safari sometimes "settles" after first paint
    setTimeout(setVH, 150);
    setTimeout(setVH, 600);
  </script>

  <script type="module" src="./main.js?v=DEV125"></script>
</body>
</html>
