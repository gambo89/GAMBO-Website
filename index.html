  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>bedroom</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    :root { --vh: 1vh; }

   #c {
  position: fixed;
  inset: 0;
  display: block;
  width: 100%;
  height: 100%;
}

    /* ✅ LOADING SCREEN */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: monospace;
      font-size: 25px;
      color: #ffffff;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

#enter-gate {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9998;
  opacity: 1;
  pointer-events: none;
  transition: opacity 0.6s ease;
}

#enter-gate.ready {
  pointer-events: auto;
}

#enter-gate.hide {
  opacity: 0;
  pointer-events: none;
}

#enter-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

#enter-text {
  margin-top: 18px;
  color: #fff;
  font-family: monospace;
  font-size: 16px;
  opacity: 0.85;
  text-align: center;
  cursor: pointer;
  user-select: none;
}

    /* ✅ iOS LANDSCAPE-ONLY OVERLAY */
    #ios-rotate-lock {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      font-family: monospace;
      text-align: center;
      padding: 24px;
    }

    #ios-rotate-lock .box {
      max-width: 520px;
      line-height: 1.4;
    }

    #ios-rotate-lock .title {
      font-size: 26px;
      margin-bottom: 10px;
    }

    #ios-rotate-lock .sub {
      opacity: 0.8;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <!-- ✅ LOADING SCREEN -->
  <div id="loader">
    <div id="loader-text">0</div>
  </div>

  <!-- ✅ ENTER GATE -->
<div id="enter-gate" aria-hidden="true">
  <video
    id="enter-video"
    src="./assets/Video/Enter Logo copy.mp4"
    muted
    playsinline
    webkit-playsinline
    preload="auto"
    loop
  ></video>

  <div id="enter-text">press to enter </div>
</div>

  <!-- ✅ iOS rotate-to-landscape lock -->
  <div id="ios-rotate-lock">
    <div class="box">
      <div class="title">rotate your phone</div>
    </div>
  </div>

  <canvas id="c"></canvas>

  <!-- Import map so main.js can import "three" -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <!-- ✅ iOS portrait blocker logic -->
  <script>
    function isIOS() {
      return (
        /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)
      );
    }

    function isLandscape() {
      return window.matchMedia("(orientation: landscape)").matches;
    }

    function updateIOSRotateLock() {
      const lock = document.getElementById("ios-rotate-lock");
      if (!lock) return;

      if (!isIOS()) {
        lock.style.display = "none";
        return;
      }

      lock.style.display = isLandscape() ? "none" : "flex";
    }

    updateIOSRotateLock();

    window.addEventListener("orientationchange", () => {
      setTimeout(updateIOSRotateLock, 150);
    });

    window.addEventListener("resize", () => {
      setTimeout(updateIOSRotateLock, 150);
    });
  </script>

  <!-- ✅ iOS viewport height fix (handles Safari tabs/address bar changing) -->
  <script>
    function setVH() {
      const vv = window.visualViewport;
      const h = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty("--vh", `${h * 0.01}px`);
    }

    // run once
    setVH();

    // keep updated
    window.addEventListener("resize", setVH);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", setVH);
      window.visualViewport.addEventListener("scroll", setVH);
    }

    // Safari sometimes "settles" after first paint
    setTimeout(setVH, 150);
    setTimeout(setVH, 600);
  </script>

  <script>
  const loaderEl = document.getElementById("loader");
  const enterGateEl = document.getElementById("enter-gate");
  const enterVideoEl = document.getElementById("enter-video");

  let enteredScene = false;

  function enableEnterGate() {
    enterGateEl.classList.add("ready");
    enterGateEl.setAttribute("aria-hidden", "false");

    if (enterVideoEl) {
      const p = enterVideoEl.play();
      if (p?.catch) {
        p.catch((err) => {
          console.warn("Enter video autoplay blocked:", err);
        });
      }
    }
  }

function enterBedroom() {
  if (enteredScene) return;
  enteredScene = true;

  enterGateEl.classList.add("hide");

  setTimeout(() => {
    enterGateEl.style.display = "none";
  }, 600); // matches your CSS transition

  if (enterVideoEl) {
    try {
      enterVideoEl.pause();
      enterVideoEl.currentTime = 0;
    } catch {}
  }
}

  if (loaderEl) {
    const loaderObserver = new MutationObserver(() => {
      if (loaderEl.classList.contains("hidden")) {
        enableEnterGate();
        loaderObserver.disconnect();
      }
    });

    loaderObserver.observe(loaderEl, {
      attributes: true,
      attributeFilter: ["class"]
    });
  }

  enterGateEl?.addEventListener("pointerdown", enterBedroom);
  enterGateEl?.addEventListener("click", enterBedroom);
</script>

  <script type="module" src="./main.js?v=DEV123"></script>
</body>
</html>
