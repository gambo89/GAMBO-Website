<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>bedroom</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    :root { --vh: 1vh; }

   #c {
  position: fixed;
  inset: 0;
  display: block;
  width: 100%;
  height: 100%;
}

    #loader {
  position: fixed;
  inset: 0;
  background: url("./assets/Loading Page/Background.jpg") center center / cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .loader-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#loader-status {
  margin-top: 18px;
  min-height: 18px;
  color: #fff;
  font-family: monospace;
  font-size: 18px;
  line-height: 1;
  text-align: center;
  user-select: none;
  opacity: 0.9;
  letter-spacing: 0.04em;
}

.loader-logo-wrap {
  position: relative;
  width: min(60vw, 600px);
  transform: translateX(-23px);
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.loader-logo {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.loader-logo-white {
  filter: brightness(0) invert(1);
}

.logo-fill-mask {
  position: absolute;
  inset: 0;
  overflow: hidden;

  /* starts with nothing revealed */
  clip-path: inset(100% 0 0 0);
  -webkit-clip-path: inset(100% 0 0 0);
}

.loader-logo-black {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

    /* ✅ iOS LANDSCAPE-ONLY OVERLAY */
    #ios-rotate-lock {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      font-family: monospace;
      text-align: center;
      padding: 24px;
    }

    #ios-rotate-lock .box {
      max-width: 520px;
      line-height: 1.4;
    }

    #ios-rotate-lock .title {
      font-size: 26px;
      margin-bottom: 10px;
    }

    #ios-rotate-lock .sub {
      opacity: 0.8;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="loader">
  <div class="loader-inner">
    <div class="loader-logo-wrap">
      <img
        class="loader-logo loader-logo-white"
        src="./assets/Loading Page/Logo.svg"
        alt="Loading logo"
      />

      <div class="logo-fill-mask">
        <img
          class="loader-logo loader-logo-black"
          src="./assets/Loading Page/Black logo.svg"
          alt=""
        />
      </div>
    </div>

    <div id="loader-status">0%</div>
  </div>
</div>

  <!-- ✅ iOS rotate-to-landscape lock -->
  <div id="ios-rotate-lock">
    <div class="box">
      <div class="title">rotate your phone</div>
    </div>
  </div>

  <canvas id="c"></canvas>

  <!-- Import map so main.js can import "three" -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <!-- ✅ iOS portrait blocker logic -->
  <script>
    function isIOS() {
      return (
        /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)
      );
    }

    function isLandscape() {
      return window.matchMedia("(orientation: landscape)").matches;
    }

    function updateIOSRotateLock() {
      const lock = document.getElementById("ios-rotate-lock");
      if (!lock) return;

      if (!isIOS()) {
        lock.style.display = "none";
        return;
      }

      lock.style.display = isLandscape() ? "none" : "flex";
    }

    updateIOSRotateLock();

    window.addEventListener("orientationchange", () => {
      setTimeout(updateIOSRotateLock, 150);
    });

    window.addEventListener("resize", () => {
      setTimeout(updateIOSRotateLock, 150);
    });
  </script>

  <!-- ✅ iOS viewport height fix (handles Safari tabs/address bar changing) -->
  <script>
    function setVH() {
      const vv = window.visualViewport;
      const h = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty("--vh", `${h * 0.01}px`);
    }

    // run once
    setVH();

    // keep updated
    window.addEventListener("resize", setVH);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", setVH);
      window.visualViewport.addEventListener("scroll", setVH);
    }

    // Safari sometimes "settles" after first paint
    setTimeout(setVH, 150);
    setTimeout(setVH, 600);
  </script>

  <script type="module" src="./main.js?v=DEV123"></script>
</body>
</html>
